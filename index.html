<!DOCTYPE html>
<html>
<head>
<title>Peak Hub X</title>

<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
overflow-x:hidden;
}

/* PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px;
background:#000000aa;
backdrop-filter:blur(10px);
}

.logo{
color:#ff004c;
font-size:24px;
font-weight:bold;
text-shadow:0 0 20px #ff004c;
}

/* SEARCH */
#searchBox{
padding:15px;
}

#searchInput{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#111;
color:white;
font-size:16px;
outline:none;
box-shadow:0 0 10px #ff004c;
}

/* ROW */
.row{
margin:20px;
}

.scroll{
display:flex;
overflow-x:auto;
}

/* CARD */
.card{
min-width:180px;
height:260px;
margin:10px;
border-radius:10px;
background-size:cover;
background-position:center;
cursor:pointer;
transition:.3s;
position:relative;
box-shadow:0 0 10px #000;
display:flex;
align-items:center;
justify-content:center;
}

.card:hover{
transform:scale(1.1);
box-shadow:0 0 25px #ff004c;
}

/* OVERLAY */
.overlay{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(to top,black,transparent);
padding:10px;
opacity:0;
transition:.3s;
}

.card:hover .overlay{
opacity:1;
}

/* PLAYER */
iframe{
width:100%;
height:400px;
border:none;
margin-top:20px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<nav>
<div class="logo">PEAK HUB</div>
<div>🎬 Movies | 🎮 Games</div>
</nav>

<!-- SEARCH -->
<div id="searchBox">
<input id="searchInput" placeholder="🔍 Search movies..." oninput="searchMovies()">
</div>

<!-- MOVIES -->
<div class="row">
<h2>🔥 Trending Movies</h2>
<div class="scroll" id="movies"></div>
</div>

<!-- GAMES -->
<div class="row">
<h2>🎮 Games</h2>
<div class="scroll" id="games"></div>
</div>

<iframe id="player"></iframe>

<script>

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:Math.random()*2-1,
vy:Math.random()*2-1
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#ff004c";
ctx.fill();
});

requestAnimationFrame(animate);
}
animate();

/* API */
const API_KEY = "YOUR_TMDB_API_KEY";

/* LOAD MOVIES */
function loadTrending(){
fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`)
.then(res=>res.json())
.then(data=>{
displayMovies(data.results);
});
}

function displayMovies(movies){
let container=document.getElementById("movies");
container.innerHTML="";

movies.forEach(movie=>{
if(!movie.poster_path) return;

let div=document.createElement("div");
div.className="card";
div.style.backgroundImage=
`url(https://image.tmdb.org/t/p/w500${movie.poster_path})`;

div.innerHTML=`
<div class="overlay">
<h4>${movie.title}</h4>
<button onclick="watchTrailer(${movie.id})">▶ Trailer</button>
<button onclick="openNetflix()">🍿 Watch</button>
</div>
`;

container.appendChild(div);
});
}

/* SEARCH */
function searchMovies(){
let query=document.getElementById("searchInput").value;

if(query.length < 2){
loadTrending();
return;
}

fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${query}`)
.then(res=>res.json())
.then(data=>{
displayMovies(data.results);
});
}

/* TRAILER */
function watchTrailer(id){
fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`)
.then(res=>res.json())
.then(data=>{
let trailer=data.results.find(v=>v.type==="Trailer");
if(trailer){
document.getElementById("player").src=
`https://www.youtube.com/embed/${trailer.key}`;
}
});
}

/* NETFLIX LINK */
function openNetflix(){
window.open("https://www.netflix.com");
}

/* GAMES */
const games = [
{ name:"Shell Shockers", url:"https://www.crazygames.com/embed/shellshockers" },
{ name:"1v1.LOL", url:"https://www.crazygames.com/embed/1v1-lol" },
{ name:"Moto X3M", url:"https://www.crazygames.com/embed/moto-x3m" },
{ name:"Run 3", url:"https://www.crazygames.com/embed/run-3" },
{ name:"Basketball Stars", url:"https://www.crazygames.com/embed/basketball-stars" }
];

function loadGames(){
let container = document.getElementById("games");

games.forEach(game=>{
let div=document.createElement("div");
div.className="card";
div.style.background="#111";

div.innerHTML=`
<div class="overlay">
<h4>${game.name}</h4>
</div>
`;

div.onclick=()=>{
document.getElementById("player").src=game.url;
};

container.appendChild(div);
});
}

/* SERVICE WORKER */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

/* INIT */
loadTrending();
loadGames();

</script>

</body>
</html>
